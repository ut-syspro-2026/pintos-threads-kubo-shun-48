name: Autograding Tests
on:
  push:
    branches: ['**']
  workflow_dispatch:
  repository_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run Pintos threads tests
        run: |
          docker run --rm \
            -v "$PWD":/home/PKUOS/pintos \
            docker.io/rui314/pintos:2026-course \
            bash -lc 'source ~/.bashrc; make -C /home/PKUOS/pintos/src/threads build/results'
        # `results` writes per-test .result files without failing the job
        # when individual tests fail. Per-test graders below report scores.
        continue-on-error: true

      - name: alarm-single
        id: alarm-single
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: alarm-single
          setup-command: ''
          command: grep -q '^PASS' src/threads/build/tests/threads/alarm-single.result
          timeout: 1
          max-score: 4

      - name: alarm-multiple
        id: alarm-multiple
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: alarm-multiple
          setup-command: ''
          command: grep -q '^PASS' src/threads/build/tests/threads/alarm-multiple.result
          timeout: 1
          max-score: 4

      - name: alarm-simultaneous
        id: alarm-simultaneous
