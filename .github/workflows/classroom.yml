          max-score: 4

      - name: mlfqs-nice-10
        id: mlfqs-nice-10
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: mlfqs-nice-10
          setup-command: ''
          command: grep -q '^PASS' src/threads/build/tests/threads/mlfqs-nice-10.result
