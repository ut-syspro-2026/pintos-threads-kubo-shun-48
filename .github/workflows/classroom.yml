          setup-command: ''
          command: grep -q '^PASS' src/threads/build/tests/threads/alarm-zero.result
          timeout: 1
          max-score: 1

      - name: alarm-negative
        id: alarm-negative
        uses: classroom-resources/autograding-command-grader@v1
        with:
